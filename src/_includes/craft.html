---
layout: layout.html
---
<article class="detail-container">
  <div class="detail-grid">
    <div class="detail-img-wrapper">
      {% if image %}
        <img src="{{ image | url }}" alt="{{ title }}">
      {% else %}
        <div style="background: var(--primary-navy); color: white; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1.5rem;">
          Craft Fun!
        </div>
      {% endif %}
    </div>
    
    <div class="detail-info">
      <h1 class="detail-title">{{ title }}</h1>
      
      <div class="detail-meta">
        <div class="meta-item craft-status" aria-label="Craft Status">
          <span>🏷️</span> Status: <strong class="badge {% if status == 'Kit for Sale' %}kit{% elif status == 'Party Theme' %}party{% else %}completed{% endif %}" style="position: static; margin-left: 0.5rem;">{{ status }}</strong>
        </div>
      </div>
      
      <div class="detail-body">
        {{ content | safe }}
      </div>
      
      <p style="margin-top: 3rem; font-family: var(--font-display);">
        <a href="{{ '/' | url }}">&larr; Back to Home</a>
      </p>
    </div>
  </div>
</article>
